<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; font-family: Arial, sans-serif; background: transparent; }

  #banner {
    background: #00c400;
    color: white;
    text-align: center;
    padding: 16px 24px;
    font-size: 1.05rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    width: 100%;
    min-height: 70px;
  }

  #banner-text {
    flex: 1;
    min-width: 200px;
    line-height: 1.6;
    word-wrap: break-word;
    white-space: normal;
  }

  #banner-btn {
    background: #003087;
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 4px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    text-decoration: none;
    flex-shrink: 0;
  }

  #banner.level3 { background: #e6a817; }
  #banner.level2 { background: #cc3300; }
  #banner.level1 { background: #800000; animation: pulse 1.5s infinite; }

  @keyframes pulse {
    0%,100% { background: #800000; }
    50%      { background: #cc0000; }
  }

  .shift-line { font-size: 0.82rem; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase; line-height: 1.7; border-top: 1px solid rgba(255,255,255,0.2); margin-top: 6px; padding-top: 6px; }
  .shift-badge { background: rgba(0,0,0,0.2); border-radius: 3px; padding: 1px 7px; margin-right: 6px; font-size: 0.78rem; }
  #banner-btn { background: rgba(0,0,30,0.45); border: 1px solid rgba(255,255,255,0.35); }
</style>
</head>
<body>

<div id="banner">
  <div id="banner-text">
    <span id="banner-main">Loading NWC operational status...</span>
  </div>
  <a id="banner-btn" href="https://docs.google.com/document/d/1" target="_blank">NWC Operational Levels</a>
</div>

<script>
var HYDRO_URL = "https://glen104.github.io/nwc-status/hydro-status.json";

function isDST() {
  var now = new Date();
  var jan = new Date(now.getFullYear(), 0, 1);
  var jul = new Date(now.getFullYear(), 6, 1);
  return now.getTimezoneOffset() < Math.max(jan.getTimezoneOffset(), jul.getTimezoneOffset());
}

function parseTimeToMins(t) {
  if (!t) return -1;
  var zm = t.toString().match(/^(\d{2}):?(\d{2})Z?$/);
  if (zm) {
    var utcMins = parseInt(zm[1]) * 60 + parseInt(zm[2]);
    var offset = isDST() ? 5 : 6;
    return (utcMins - offset * 60 + 1440) % 1440;
  }
  var m = t.toString().match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return -1;
  var h = parseInt(m[1]); var mn = parseInt(m[2]); var ap = m[3].toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  return h * 60 + mn;
}

function getCurrentCTMins() {
  var now = new Date();
  var ctStr = now.toLocaleString('en-US', { timeZone: 'America/Chicago', hour: 'numeric', minute: '2-digit', hour12: true });
  var p = ctStr.match(/(\d+):(\d+)\s+(AM|PM)/i);
  if (!p) return 0;
  var h = parseInt(p[1]); var mn = parseInt(p[2]); var ap = p[3].toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  return h * 60 + mn;
}

function getCurrentShift(shifts) {
  if (!shifts || !shifts.length) return null;
  var ctMins = getCurrentCTMins();
  for (var i = 0; i < shifts.length; i++) {
    var s = shifts[i];
    var start = parseTimeToMins(s.start);
    var end   = parseTimeToMins(s.end);
    if (start < 0 || end < 0) continue;
    if (end < start) {
      if (ctMins >= start || ctMins < end) return s;
    } else {
      if (ctMins >= start && ctMins < end) return s;
    }
  }
  return null;
}

function getNextShift(shifts) {
  if (!shifts || !shifts.length) return null;
  var ctMins = getCurrentCTMins();
  for (var i = 0; i < shifts.length; i++) {
    var s = shifts[i];
    var start = parseTimeToMins(s.start);
    if (start < 0) continue;
    var diff = (start - ctMins + 1440) % 1440;
    if (diff > 0 && diff <= 120) return s;  // 2 hour warning
  }
  return null;
}

function toDisplayTime(t) {
  if (!t) return '';
  // Handle Z/24hr formats: "1600", "16:00", "16:00Z"
  var zm = t.toString().match(/^(\d{2}):?(\d{2})Z?$/);
  if (zm) {
    var utcH = parseInt(zm[1]); var utcM = parseInt(zm[2]);
    var offset = isDST() ? 5 : 6;
    var tz = isDST() ? 'CDT' : 'CST';
    var ctMins = (utcH * 60 + utcM - offset * 60 + 1440) % 1440;
    var h = Math.floor(ctMins / 60); var m = ctMins % 60;
    var ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if (h === 0) h = 12;
    return h + (m > 0 ? ':' + (m < 10 ? '0' + m : m) : '') + ' ' + ap + ' ' + tz;
  }
  // Already 12hr format - just return as-is
  return t;
}

function formatShiftPlan(label, s) {
  if (!s) return '';
  var parts = [];
  if (s.lead) parts.push('Lead: ' + s.lead);
  var fores = s.forecasters || (s.forecaster ? [s.forecaster] : []);
  fores = fores.filter(function(f){ return f; });
  if (fores.length) parts.push('Forecaster: ' + fores.join(', '));
  var endTime = s.end ? ' thru ' + toDisplayTime(s.end) : '';
  var staff = parts.length ? '  ' + parts.join(' / ') : '';
  return '<span class="shift-badge">' + label + '</span>' + endTime + ':' + staff;
}

function updateBanner(nwc) {
  var level  = nwc.opsLevel || 'Level 4 (Normal Operations)';
  var reason = nwc.reason   || '';
  var hours  = nwc.hours    || '5:00 AM - 8:30 PM CT';
  var shifts = nwc.shifts   || [];
  var fim    = nwc.fim      || null;
  var ic     = nwc.ic       || null;

  // Line 1 - status
  var line1 = 'The NWC is currently at ' + level + '  |  NWC OPS Available: ' + hours;
  if (reason) line1 += '  |  ' + reason;

  // Line 2 - shift plan
  var line2Parts = [];

  var curShift = getCurrentShift(shifts);
  if (curShift) line2Parts.push(formatShiftPlan('CURRENT SHIFT', curShift));

  var nextShift = getNextShift(shifts);
  if (nextShift) line2Parts.push(formatShiftPlan('NEXT SHIFT', nextShift));

  if (fim && fim.name) {
    var fimStr = '<span class="shift-badge">FIM COORD</span> ' + fim.name;
    if (fim.start) fimStr += ' (' + toDisplayTime(fim.start) + (fim.end ? ' - ' + toDisplayTime(fim.end) : '') + ')';
    line2Parts.push(fimStr);
  }

  if (ic && ic.name) {
    var icStr = '<span class="shift-badge">IC</span> ' + ic.name;
    if (ic.start) icStr += ' (' + toDisplayTime(ic.start) + (ic.end ? ' - ' + toDisplayTime(ic.end) : '') + ')';
    line2Parts.push(icStr);
  }

  var html = line1;
  if (line2Parts.length) {
    html += '<div class="shift-line">' + line2Parts.join('<span style="opacity:0.4; margin:0 10px;">|</span>') + '</div>';
  }
  document.getElementById('banner-main').innerHTML = html;

  var banner = document.getElementById('banner');
  banner.className = '';
  if      (level.indexOf('Level 1') !== -1) banner.className = 'level1';
  else if (level.indexOf('Level 2') !== -1) banner.className = 'level2';
  else if (level.indexOf('Level 3') !== -1) banner.className = 'level3';
}

function fetchStatus() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', HYDRO_URL + '?cb=' + Date.now(), true);
  xhr.setRequestHeader('Cache-Control', 'no-cache, no-store, must-revalidate');
  xhr.setRequestHeader('Pragma', 'no-cache');
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        updateBanner(data.nwc || {});
      } catch(e) {
        document.getElementById('banner-main').innerText = 'Status unavailable.';
      }
    }
  };
  xhr.send();
}

fetchStatus();
setInterval(fetchStatus, 5000);
</script>

</body>
</html>
