<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; font-family: Arial, sans-serif; background: transparent; }

  #banner {
    background: #1a7a1a;
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    width: 100%;
    min-height: 70px;
  }

  #banner-text { flex: 1; min-width: 0; line-height: 1.5; overflow: visible; word-break: break-word; }

  .line1 { font-size: 1rem; font-weight: 700; letter-spacing: 0.2px; }
  .line1 .sep { opacity: 0.5; margin: 0 8px; font-weight: 400; }

  .line2 {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.2);
    font-size: 0.8rem;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    line-height: 1.7;
    overflow: visible;
    white-space: normal;
    word-break: break-word;
  }
  .line2 .sep { opacity: 0.35; margin: 0 10px; font-weight: 400; }
  .badge {
    display: inline-block;
    background: rgba(0,0,0,0.25);
    border-radius: 3px;
    padding: 1px 7px;
    margin-right: 6px;
    font-size: 0.72rem;
    letter-spacing: 1px;
  }

  #banner-btn {
    background: rgba(0,0,30,0.45);
    color: white;
    border: 1px solid rgba(255,255,255,0.35);
    padding: 8px 18px;
    border-radius: 4px;
    font-size: 0.85rem;
    font-weight: 700;
    white-space: nowrap;
    text-decoration: none;
    flex-shrink: 0;
  }

  #banner.level3 { background: #8a5500; }
  #banner.level2 { background: #8a1f00; }
  #banner.level1 { background: #5a0000; animation: pulse 1.5s infinite; }

  @keyframes pulse {
    0%,100% { background: #5a0000; }
    50%      { background: #8a0000; }
  }
</style>
</head>
<body>
<div id="banner">
  <div id="banner-text">
    <div class="line1" id="line1">Loading NWC operational status...</div>
    <div class="line2" id="line2" style="display:none;"></div>
  </div>
  <a id="banner-btn" href="https://docs.google.com/document/d/1" target="_blank">NWC Operational Levels</a>
</div>

<script>
var HYDRO_URL = "https://glen104.github.io/nwc-status/hydro-status.json";

function isDST() {
  var now = new Date();
  var jan = new Date(now.getFullYear(), 0, 1);
  var jul = new Date(now.getFullYear(), 6, 1);
  return now.getTimezoneOffset() < Math.max(jan.getTimezoneOffset(), jul.getTimezoneOffset());
}

function toDisplayTime(t) {
  if (!t) return '';
  var zm = t.toString().match(/^(\d{1,2}):?(\d{2})Z?$/);
  if (zm) {
    var offset = isDST() ? 5 : 6;
    var tz = isDST() ? 'CDT' : 'CST';
    var ctMins = (parseInt(zm[1]) * 60 + parseInt(zm[2]) - offset * 60 + 1440) % 1440;
    var h = Math.floor(ctMins / 60); var m = ctMins % 60;
    var ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if (h === 0) h = 12;
    return h + (m > 0 ? ':' + (m < 10 ? '0' + m : m) : '') + ' ' + ap + ' ' + tz;
  }
  return t;
}

function parseTimeToMins(t) {
  if (!t) return -1;
  var zm = t.toString().match(/^(\d{1,2}):?(\d{2})Z?$/);
  if (zm) {
    var offset = isDST() ? 5 : 6;
    return (parseInt(zm[1]) * 60 + parseInt(zm[2]) - offset * 60 + 1440) % 1440;
  }
  var m = t.toString().match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return -1;
  var h = parseInt(m[1]); var mn = parseInt(m[2]); var ap = m[3].toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  return h * 60 + mn;
}

function getCurrentCTMins() {
  var now = new Date();
  var s = now.toLocaleString('en-US', { timeZone: 'America/Chicago', hour: 'numeric', minute: '2-digit', hour12: true });
  var p = s.match(/(\d+):(\d+)\s+(AM|PM)/i);
  if (!p) return 0;
  var h = parseInt(p[1]); var mn = parseInt(p[2]); var ap = p[3].toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  return h * 60 + mn;
}

function getCurrentShift(shifts) {
  if (!shifts || !shifts.length) return null;
  var ct = getCurrentCTMins();
  for (var i = 0; i < shifts.length; i++) {
    var s = shifts[i];
    var start = parseTimeToMins(s.start); var end = parseTimeToMins(s.end);
    if (start < 0 || end < 0) continue;
    if (end < start) { if (ct >= start || ct < end) return s; }
    else { if (ct >= start && ct < end) return s; }
  }
  return null;
}

function getNextShift(shifts) {
  if (!shifts || !shifts.length) return null;
  var ct = getCurrentCTMins();
  var cur = getCurrentShift(shifts);
  var best = null; var bestDiff = 9999;
  for (var i = 0; i < shifts.length; i++) {
    var s = shifts[i];
    if (s === cur) continue;
    var start = parseTimeToMins(s.start);
    if (start < 0) continue;
    var diff = (start - ct + 1440) % 1440;
    if (diff > 0 && diff <= 120 && diff < bestDiff) { best = s; bestDiff = diff; }
  }
  return best;
}

function badge(label) {
  return '<span class="badge">' + label + '</span>';
}

function sep() {
  return '<span class="sep">|</span>';
}

function formatShiftBlock(label, s) {
  if (!s) return '';
  var parts = [];
  if (s.lead) parts.push('Lead: ' + s.lead);
  var fores = [];
  if (s.forecasters && s.forecasters.length) {
    fores = s.forecasters.filter(function(f){ return f && f.trim(); });
  }
  if (!fores.length && s.forecaster && s.forecaster.trim()) {
    fores = [s.forecaster];
  }
  if (fores.length) parts.push('Forecaster: ' + fores.join(', '));
  var startTime = s.start ? toDisplayTime(s.start) : '';
  var endTime   = s.end   ? toDisplayTime(s.end)   : '';
  var timeStr   = startTime && endTime ? ' ' + startTime + ' - ' + endTime : (endTime ? ' thru ' + endTime : '');
  var staffStr  = parts.length ? '&nbsp;&nbsp;' + parts.join(' / ') : '';
  return badge(label) + timeStr + ':' + staffStr;
}

function updateBanner(nwc) {
  var level  = nwc.opsLevel || 'Level 4 (Normal Operations)';
  var reason = nwc.reason   || '';
  var hours  = nwc.hours    || '5:00 AM - 8:30 PM CT';
  var shifts = nwc.shifts   || [];
  var fim    = nwc.fim      || null;
  var ic     = nwc.ic       || null;

  // Line 1
  var l1 = ['The NWC is currently at ' + level, 'NWC OPS Available: ' + hours];
  if (reason) l1.push(reason);
  document.getElementById('line1').innerHTML = l1.join('<span class="sep">|</span>');

  // Line 2
  var l2 = [];
  var cur = getCurrentShift(shifts);
  if (cur) l2.push(formatShiftBlock('CURRENT SHIFT', cur));
  var nxt = getNextShift(shifts);
  if (nxt) l2.push(formatShiftBlock('NEXT SHIFT', nxt));

  if (fim && fim.name) {
    var fs = badge('FIM COORD') + fim.name;
    if (fim.start) fs += ' (' + toDisplayTime(fim.start) + (fim.end ? ' &ndash; ' + toDisplayTime(fim.end) : '') + ')';
    l2.push(fs);
  }
  if (ic && ic.name) {
    var is = badge('IC') + ic.name;
    if (ic.start) is += ' (' + toDisplayTime(ic.start) + (ic.end ? ' &ndash; ' + toDisplayTime(ic.end) : '') + ')';
    l2.push(is);
  }

  var line2El = document.getElementById('line2');
  if (l2.length) {
    line2El.innerHTML = l2.join(sep());
    line2El.style.display = 'block';
  } else {
    line2El.style.display = 'none';
  }

  var banner = document.getElementById('banner');
  banner.className = '';
  if      (level.indexOf('Level 1') !== -1) banner.className = 'level1';
  else if (level.indexOf('Level 2') !== -1) banner.className = 'level2';
  else if (level.indexOf('Level 3') !== -1) banner.className = 'level3';
}

function fetchStatus() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', HYDRO_URL + '?cb=' + Date.now(), true);
  xhr.setRequestHeader('Cache-Control', 'no-cache, no-store, must-revalidate');
  xhr.setRequestHeader('Pragma', 'no-cache');
  xhr.onload = function() {
    if (xhr.status === 200) {
      try { updateBanner(JSON.parse(xhr.responseText).nwc || {}); }
      catch(e) { document.getElementById('line1').innerText = 'Status unavailable.'; }
    }
  };
  xhr.send();
}

fetchStatus();
setInterval(fetchStatus, 5000);
</script>
</body>
</html>
